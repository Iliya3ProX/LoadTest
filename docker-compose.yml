services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - balance
    networks:
      - loadtest-network

  balance:
    build:
      context: ./Balance
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    networks:
      - loadtest-network

networks:
  loadtest-network:
    driver: bridge
